name: Bootstrap Admin

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Supabase environment target"
        required: true
        type: choice
        options:
          - staging
          - production
      update_password:
        description: "Set true only if password rotation is explicitly intended"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  bootstrap-admin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve staging secrets
        if: ${{ inputs.target == 'staging' }}
        shell: bash
        run: |
          set -euo pipefail

          echo "SUPABASE_URL=${{ secrets.STAGING_SUPABASE_URL }}" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}" >> "$GITHUB_ENV"
          echo "BOOTSTRAP_ADMIN_EMAIL=${{ secrets.STAGING_BOOTSTRAP_ADMIN_EMAIL }}" >> "$GITHUB_ENV"
          echo "BOOTSTRAP_ADMIN_PASSWORD=${{ secrets.STAGING_BOOTSTRAP_ADMIN_PASSWORD }}" >> "$GITHUB_ENV"

          echo "BOOTSTRAP_UPDATE_PASSWORD=${{ inputs.update_password }}" >> "$GITHUB_ENV"

      - name: Resolve production secrets
        if: ${{ inputs.target == 'production' }}
        shell: bash
        run: |
          set -euo pipefail

          echo "SUPABASE_URL=${{ secrets.PRODUCTION_SUPABASE_URL }}" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.PRODUCTION_SUPABASE_SERVICE_ROLE_KEY }}" >> "$GITHUB_ENV"
          echo "BOOTSTRAP_ADMIN_EMAIL=${{ secrets.PRODUCTION_BOOTSTRAP_ADMIN_EMAIL }}" >> "$GITHUB_ENV"
          echo "BOOTSTRAP_ADMIN_PASSWORD=${{ secrets.PRODUCTION_BOOTSTRAP_ADMIN_PASSWORD }}" >> "$GITHUB_ENV"

          echo "BOOTSTRAP_UPDATE_PASSWORD=${{ inputs.update_password }}" >> "$GITHUB_ENV"

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          for key in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY BOOTSTRAP_ADMIN_EMAIL BOOTSTRAP_ADMIN_PASSWORD; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required value for $key" >&2
              exit 1
            fi
          done

      - name: Bootstrap admin
        run: npm run bootstrap:admin
